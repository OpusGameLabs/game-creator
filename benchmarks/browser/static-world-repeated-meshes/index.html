<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static World Repeated Meshes Benchmark</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #080a10;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        min-width: 260px;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(10, 14, 18, 0.82);
        color: #dce7ef;
        font:
          12px/1.45 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        backdrop-filter: blur(10px);
      }

      .hud h1 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud pre {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <h1 id="hud-title">Benchmark</h1>
      <pre id="hud-metrics">Booting...</pre>
    </div>
    <canvas id="benchmark-canvas"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
  </html>
