<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini World</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100%; height: 100%; }
      .ui {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        padding: 10px 18px; border-radius: 8px;
        background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
        color: #e0e8f0; font: 13px/1.4 system-ui, sans-serif;
        text-align: center; pointer-events: none; user-select: none;
      }
      .ui .keys { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
      .ui .key {
        width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.25);
        border-radius: 4px; display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.06);
      }
      .ui .key.active { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
      .coins {
        position: fixed; top: 20px; right: 20px;
        padding: 8px 14px; border-radius: 6px;
        background: rgba(0,0,0,0.55); backdrop-filter: blur(12px);
        color: #ffd644; font: bold 16px system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="coins" id="coins">0 / 20</div>
    <div class="ui">
      <div>WASD to move &middot; Space to jump</div>
      <div class="keys">
        <div class="key" id="k-w">W</div>
        <div class="key" id="k-a">A</div>
        <div class="key" id="k-s">S</div>
        <div class="key" id="k-d">D</div>
        <div class="key" style="width:56px" id="k-space">&#9251;</div>
      </div>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="./main.js"></script>
  </body>
</html>
